name: Build and Push to DockerHub

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'config.json'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate sing-box config
        run: |
          wget -qO /tmp/sb.tar.gz \
            "https://github.com/SagerNet/sing-box/releases/download/v1.11.0/sing-box-1.11.0-linux-amd64.tar.gz"
          tar -xzf /tmp/sb.tar.gz -C /tmp
          mv /tmp/sing-box-*/sing-box /tmp/sing-box
          chmod +x /tmp/sing-box
          /tmp/sing-box check -c config.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gojo-s-box:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/gojo-s-box:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
